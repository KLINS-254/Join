<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Select Seats</title>

<link
rel="stylesheet"
href="css/seats.css">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header class="seat-header">

<button
class="back-btn"
onclick="history.back()">

<i class="fa-solid fa-arrow-left"></i>

</button>

<div>

<h2 id="busName">

ENA Coach

</h2>

<p id="route">

Nairobi - Kisumu

</p>

</div>

</header>

<!-- BUS DETAILS -->

<section class="trip-info">

<div>

<h4>Departure</h4>

<p id="departure"></p>

</div>

<div>

<h4>Arrival</h4>

<p id="arrival"></p>

</div>

<div>

<h4>Price</h4>

<p id="price"></p>

</div>

</section>

<!-- LEGEND -->

<section class="legend">

<div>

<div class="seat available"></div>

Available

</div>

<div>

<div class="seat booked"></div>

Booked

</div>

<div>

<div class="seat selected"></div>

Selected

</div>

</section>

<!-- BUS LAYOUT -->

<section class="bus-layout">

<div class="driver">

<i class="fa-solid fa-steering-wheel"></i>

</div>

<div
id="seatContainer">

<!-- Seats generated by JavaScript -->

</div>

</section>

<!-- SELECTED -->

<section class="selection">

<h3>

Selected Seats

</h3>

<div id="selectedSeats">

None

</div>

<h2 id="totalPrice">

KSh 0

</h2>

<button
id="continueBtn">

Continue

</button>

</section>

<script src="js/seats.js"></script>

</body>

</html>
